apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-init-replica-set
  namespace: blog-app
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-init-replica-set
          image: mongo:7
          command:
            - bash
            - -c
            - |
              for host in mongo-0.mongo mongo-1.mongo mongo-2.mongo; do
                until mongosh --host "$host:27017" --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
                  sleep 2
                done
              done

              mongosh --host mongo-0.mongo:27017 --eval '
                  try {
                    rs.status();
                  } catch (error) {
                    rs.initiate({
                      _id: "rs0",
                      members: [
                        { _id: 0, host: "mongo-0.mongo:27017" },
                        { _id: 1, host: "mongo-1.mongo:27017" },
                        { _id: 2, host: "mongo-2.mongo:27017" }
                      ]
                    });
                  }
                '
